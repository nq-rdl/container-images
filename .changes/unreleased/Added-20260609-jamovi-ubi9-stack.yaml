kind: Added
body: 'UBI9 jamovi stack — r-base-ubi9 (Posit R 4.5.0, the rstudio/r-base equivalent), jamovi-deps-ubi9 (~200 CRAN packages), and jamovi-ubi9 (jamovi v2.7.30 server) — chained via docker buildx bake. UBI9 lacks flexiblas-devel/protobuf/boost, so the chain enables EPEL + AlmaLinux 9 at priority=200 (UBI/Red Hat packages always win). Also: validate-base-pins logs in to GHCR so a brand-new chain bootstrap-SKIPs reachability instead of failing on DENIED.'
