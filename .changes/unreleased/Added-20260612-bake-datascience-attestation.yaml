kind: Added
body: 'Add GitHub-native provenance and SBOM attestation (actions/attest-build-provenance@v4 + anchore/sbom-action@v0 CycloneDX + actions/attest-sbom@v4, each with a one-shot Sigstore/Rekor retry) for all four datascience bake-published images: docker-stacks-foundation-ubi9, base-notebook-ubi9, minimal-notebook-ubi9, scipy-notebook-ubi9. Every image-publishing CI job is now attestation-gated — the temporary known-gap allowlist for the datascience bake job is gone, and `gh attestation verify` works for the whole catalog.'
