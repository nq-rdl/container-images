name: Build Images

on:
  push:
    branches: [main]
    paths: ['images/**', '.github/workflows/build.yml']
  pull_request:
    paths: ['images/**', '.github/workflows/build.yml']
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      image:
        description: 'Image name to build, or "all"'
        required: false
        default: 'all'

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  security-events: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.set-matrix.outputs.images }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: set-matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_IMAGE: ${{ github.event.inputs.image }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "schedule" ]] \
             || [[ "${INPUT_IMAGE}" == "all" ]]; then
            IMAGES=$(find images -mindepth 1 -maxdepth 1 -type d -exec test -f '{}/Containerfile' \; -printf '%f\n' \
                     | jq -R -s -c 'split("\n") | map(select(length > 0))')
          elif [[ -n "${INPUT_IMAGE}" ]]; then
            IMAGES=$(echo "${INPUT_IMAGE}" | jq -R -c '[.]')
          else
            CHANGED=$(git diff --name-only "${BASE_SHA}" HEAD -- 'images/' \
                       | cut -d/ -f2 | sort -u \
                       | while read -r dir; do
                           if [ -f "images/${dir}/Containerfile" ]; then echo "${dir}"; fi
                         done \
                       | jq -R -s -c 'split("\n") | map(select(length > 0))')
            IMAGES="$CHANGED"
          fi
          echo "images=$IMAGES" >> "$GITHUB_OUTPUT"

  build:
    needs: discover
    if: needs.discover.outputs.images != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.discover.outputs.images) }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Read image.yaml tags
        id: image-tags
        env:
          IMAGE_DIR: images/${{ matrix.image }}
        run: |
          set -euo pipefail
          YAML="${IMAGE_DIR}/image.yaml"
          TAGS=""
          if [ -f "${YAML}" ]; then
            while IFS= read -r tag; do
              [ -z "${tag}" ] && continue
              [ "${tag}" = "latest" ] && continue
              TAGS+="type=raw,value=${tag},enable={{is_default_branch}}"$'\n'
            done < <(yq -r '(.tags // [])[]' "${YAML}")
          fi
          {
            echo 'custom_tags<<EOF'
            printf '%s' "${TAGS}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}
            ${{ steps.image-tags.outputs.custom_tags }}

      - id: build-pr
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: images/${{ matrix.image }}
          file: images/${{ matrix.image }}/Containerfile
          platforms: linux/amd64
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      - id: build-push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: images/${{ matrix.image }}
          file: images/${{ matrix.image }}/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ github.event_name == 'pull_request' && steps.build-pr.outputs.imageid || format('ghcr.io/{0}/{1}@{2}', github.repository_owner, matrix.image, steps.build-push.outputs.digest) }}
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}

      - uses: sigstore/cosign-installer@v3
        if: github.event_name != 'pull_request'

      - name: Sign image (keyless)
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build-push.outputs.digest }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
        run: cosign sign --yes --registry-referrers-mode=oci-1-1 "${IMAGE}@${DIGEST}"

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}@${{ steps.build-push.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.image }}.spdx.json

      - name: Attest SBOM
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build-push.outputs.digest }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
        run: |
          cosign attest --yes \
            --registry-referrers-mode=oci-1-1 \
            --predicate sbom-${{ matrix.image }}.spdx.json \
            --type spdxjson \
            "${IMAGE}@${DIGEST}"

  publish-aliases:
    if: github.event_name != 'pull_request'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@v3

      - name: Install yq
        run: |
          YQ_VERSION=4.44.6
          curl -fsSL -o /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64"
          chmod +x /usr/local/bin/yq

      - name: Publish and sign convenience aliases
        env:
          COSIGN_EXPERIMENTAL: "1"
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          for image_dir in images/*/; do
            image_name=$(basename "$image_dir")

            if [[ ! "$image_name" =~ ^(.+)-ubi([0-9]+)$ ]]; then
              echo "Skipping ${image_name} — no UBI suffix to strip"
              continue
            fi
            alias_name="${BASH_REMATCH[1]}"

            source_image="ghcr.io/${OWNER}/${image_name}"
            alias_image="ghcr.io/${OWNER}/${alias_name}"

            digest=$(docker buildx imagetools inspect "${source_image}:latest" --format '{{json .Manifest}}' 2>/dev/null | jq -r '.digest' || true)
            if [ -z "$digest" ] || [ "$digest" = "null" ]; then
              echo "Warning: could not fetch digest for ${source_image}:latest — skipping"
              continue
            fi

            source_ref="${source_image}@${digest}"

            declare -a TAGS=()
            TAGS+=(--tag "${alias_image}:latest")

            if [ -f "${image_dir}/image.yaml" ]; then
              while IFS= read -r tag; do
                [ -z "${tag}" ] && continue
                [ "${tag}" = "latest" ] && continue
                TAGS+=(--tag "${alias_image}:${tag}")
              done < <(yq -r '(.tags // [])[]' "${image_dir}/image.yaml")
            fi

            echo "Publishing alias: ${alias_image} -> ${source_ref}"
            docker buildx imagetools create "${TAGS[@]}" "${source_ref}"

            alias_digest=$(docker buildx imagetools inspect "${alias_image}:latest" --format '{{json .Manifest}}' | jq -r '.digest')
            if [ -n "$alias_digest" ] && [ "$alias_digest" != "null" ]; then
              cosign sign --yes --registry-referrers-mode=oci-1-1 "${alias_image}@${alias_digest}"
            fi

            unset TAGS
          done
