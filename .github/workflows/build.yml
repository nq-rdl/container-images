name: Build Images

on:
  push:
    branches: [main]
    paths: ['images/**', '.github/workflows/build.yml']
  pull_request:
    paths: ['images/**', '.github/workflows/build.yml']
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      image:
        description: 'Image name to build, or "all"'
        required: false
        default: 'all'

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  security-events: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.set-matrix.outputs.images }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: set-matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_IMAGE: ${{ github.event.inputs.image }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "schedule" ]] \
             || [[ "${INPUT_IMAGE}" == "all" ]]; then
            IMAGES=$(find images -mindepth 1 -maxdepth 1 -type d -exec test -f '{}/Containerfile' \; -printf '%f\n' \
                     | jq -R -s -c 'split("\n") | map(select(length > 0))')
          elif [[ -n "${INPUT_IMAGE}" ]]; then
            IMAGES=$(echo "${INPUT_IMAGE}" | jq -R -c '[.]')
          else
            CHANGED=$(git diff --name-only "${BASE_SHA}" HEAD -- 'images/' \
                       | cut -d/ -f2 | sort -u \
                       | while read -r dir; do
                           if [ -f "images/${dir}/Containerfile" ]; then echo "${dir}"; fi
                         done \
                       | jq -R -s -c 'split("\n") | map(select(length > 0))')
            IMAGES="$CHANGED"
          fi
          echo "images=$IMAGES" >> "$GITHUB_OUTPUT"

  build:
    needs: discover
    if: needs.discover.outputs.images != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.discover.outputs.images) }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read image.yaml tags
        id: image-tags
        env:
          IMAGE_DIR: images/${{ matrix.image }}
        run: |
          set -euo pipefail
          YAML="${IMAGE_DIR}/image.yaml"
          TAGS=""
          if [ -f "${YAML}" ]; then
            while IFS= read -r tag; do
              [ "${tag}" = "latest" ] && continue
              TAGS="${TAGS}type=raw,value=${tag},enable={{is_default_branch}}
          "
            done < <(yq -r '.tags[]' "${YAML}")
          fi
          {
            echo 'custom_tags<<EOF'
            echo "${TAGS}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            ${{ steps.image-tags.outputs.custom_tags }}

      - id: build-pr
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: images/${{ matrix.image }}
          file: images/${{ matrix.image }}/Containerfile
          platforms: linux/amd64
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      - id: build-push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: images/${{ matrix.image }}
          file: images/${{ matrix.image }}/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ github.event_name == 'pull_request' && steps.build-pr.outputs.imageid || format('ghcr.io/{0}/{1}@{2}', github.repository_owner, matrix.image, steps.build-push.outputs.digest) }}
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}

      - uses: sigstore/cosign-installer@v3
        if: github.event_name != 'pull_request'

      - name: Sign image (keyless)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build-push.outputs.digest }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}@${{ steps.build-push.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.image }}.spdx.json

      - name: Attest SBOM
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build-push.outputs.digest }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
        run: |
          cosign attest --yes \
            --predicate sbom-${{ matrix.image }}.spdx.json \
            --type spdxjson \
            "${IMAGE}@${DIGEST}"
