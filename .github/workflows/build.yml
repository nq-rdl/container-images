name: Build Images

on:
  push:
    branches: [main]
    paths: ['images/**', '.github/workflows/build.yml']
  pull_request:
    paths: ['images/**', '.github/workflows/build.yml']
  workflow_dispatch:
    inputs:
      image:
        description: 'Image name to build, or "all"'
        required: false
        default: 'all'

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  security-events: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          YQ_VERSION=4.44.6
          curl -fsSL -o /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64"
          chmod +x /usr/local/bin/yq

      - id: set-matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_IMAGE: ${{ github.event.inputs.image }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail

          # Collect image directories to consider
          if [[ "${INPUT_IMAGE}" == "all" ]]; then
            DIRS=$(find images -mindepth 1 -maxdepth 1 -type d \
                     -exec test -f '{}/Containerfile' \; -printf '%f\n' | sort)
          elif [[ -n "${INPUT_IMAGE}" ]]; then
            DIRS="${INPUT_IMAGE}"
          else
            DIRS=$(git diff --name-only "${BASE_SHA}" HEAD -- 'images/' \
                     | cut -d/ -f2 | sort -u \
                     | while read -r dir; do
                         if [ -f "images/${dir}/Containerfile" ]; then echo "${dir}"; fi
                       done)
          fi

          # Build matrix: expand build_matrix entries when present
          MATRIX="[]"
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            YAML="images/${dir}/image.yaml"

            if [ -f "$YAML" ] && yq -e '.build_matrix' "$YAML" >/dev/null 2>&1; then
              BUILD_ARG=$(yq -r '.build_matrix.arg // ""' "$YAML")
              while IFS= read -r row; do
                VER=$(echo "$row" | jq -r '.version')
                TAGS=$(echo "$row" | jq -c '.tags // []')
                BA=""
                [ -n "$BUILD_ARG" ] && [ -n "$VER" ] && BA="${BUILD_ARG}=${VER}"
                MATRIX=$(echo "$MATRIX" | jq \
                  --arg img "$dir" \
                  --arg ver "$VER" \
                  --arg ba "$BA" \
                  --argjson tags "$TAGS" \
                  '. + [{"image": $img, "version": $ver, "build_args": $ba, "version_tags": $tags}]')
              done < <(yq -o=json -I=0 '.build_matrix.versions[]' "$YAML")
            else
              MATRIX=$(echo "$MATRIX" | jq \
                --arg img "$dir" \
                '. + [{"image": $img, "version": "", "build_args": "", "version_tags": []}]')
            fi
          done <<< "$DIRS"

          echo "matrix=$(echo "$MATRIX" | jq -c '.')" >> "$GITHUB_OUTPUT"

  build:
    needs: discover
    if: needs.discover.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          YQ_VERSION=4.44.6
          curl -fsSL -o /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64"
          chmod +x /usr/local/bin/yq

      - name: Compute image tags
        id: image-tags
        env:
          IMAGE_DIR: images/${{ matrix.image }}
          VERSION_TAGS: ${{ toJson(matrix.version_tags) }}
          IMAGE_VERSION: ${{ matrix.version }}
        run: |
          set -euo pipefail
          YAML="${IMAGE_DIR}/image.yaml"
          TAGS=""
          INCLUDE_LATEST="true"

          if [ -n "${IMAGE_VERSION}" ]; then
            # build_matrix entry — use version_tags
            INCLUDE_LATEST="false"
            for tag in $(echo "${VERSION_TAGS}" | jq -r '.[]'); do
              [ -z "${tag}" ] && continue
              if [ "${tag}" = "latest" ]; then
                INCLUDE_LATEST="true"
                continue
              fi
              TAGS+="type=raw,value=${tag},enable={{is_default_branch}}"$'\n'
            done
          elif [ -f "${YAML}" ]; then
            while IFS= read -r tag; do
              [ -z "${tag}" ] && continue
              [ "${tag}" = "latest" ] && continue
              TAGS+="type=raw,value=${tag},enable={{is_default_branch}}"$'\n'
            done < <(yq -r '(.tags // [])[]' "${YAML}")
          fi

          # Read platforms from image.yaml (default: linux/amd64)
          PLATFORMS="linux/amd64"
          if [ -f "${YAML}" ]; then
            PLATFORMS=$(yq -r '(.platforms // ["linux/amd64"]) | join(",")' "${YAML}")
          fi

          {
            echo 'custom_tags<<EOF'
            printf '%s' "${TAGS}"
            echo 'EOF'
            echo "include_latest=${INCLUDE_LATEST}"
            echo "platforms=${PLATFORMS}"
          } >> "$GITHUB_OUTPUT"

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=pr${{ matrix.version != '' && format(',suffix=-{0}', matrix.version) || '' }}
            ${{ steps.image-tags.outputs.include_latest == 'true' && 'type=raw,value=latest,enable={{is_default_branch}}' || '' }}
            ${{ steps.image-tags.outputs.custom_tags }}

      - id: build-pr
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: images/${{ matrix.image }}
          file: images/${{ matrix.image }}/Containerfile
          platforms: linux/amd64
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.image }}${{ matrix.version != '' && format('-{0}', matrix.version) || '' }}
          cache-to: type=gha,scope=${{ matrix.image }}${{ matrix.version != '' && format('-{0}', matrix.version) || '' }},mode=max

      - id: build-push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: images/${{ matrix.image }}
          file: images/${{ matrix.image }}/Containerfile
          platforms: ${{ steps.image-tags.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.image }}${{ matrix.version != '' && format('-{0}', matrix.version) || '' }}
          cache-to: type=gha,scope=${{ matrix.image }}${{ matrix.version != '' && format('-{0}', matrix.version) || '' }},mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ github.event_name == 'pull_request' && steps.build-pr.outputs.imageid || format('ghcr.io/{0}/{1}@{2}', github.repository_owner, matrix.image, steps.build-push.outputs.digest) }}
          format: sarif
          output: trivy-${{ matrix.image }}${{ matrix.version != '' && format('-{0}', matrix.version) || '' }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.image }}${{ matrix.version != '' && format('-{0}', matrix.version) || '' }}.sarif
          category: trivy-${{ matrix.image }}${{ matrix.version != '' && format('-{0}', matrix.version) || '' }}

      - name: Attest build provenance
        id: attest-provenance
        if: github.event_name != 'pull_request'
        # continue-on-error lets the retry step below absorb transient Sigstore/Rekor
        # failures (e.g. "error creating tlog entry") without failing the whole build.
        # The retry gates on steps.<id>.outcome (NOT conclusion): continue-on-error forces
        # conclusion to 'success', so only outcome still reports the real 'failure'.
        continue-on-error: true
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          # Not pushed to GHCR (push creates sha256-<digest> referrer tags); verified via the GitHub attestation API instead.
          push-to-registry: false

      - name: Attest build provenance (retry)
        # One retry on transient Sigstore/Rekor failures. If this also fails the build fails.
        if: github.event_name != 'pull_request' && steps.attest-provenance.outcome == 'failure'
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: false

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}@${{ steps.build-push.outputs.digest }}
          # CycloneDX JSON is materially more compact than SPDX JSON. actions/attest-sbom
          # rejects SBOMs larger than 16 MiB; the StarRocks allin1 image's SPDX SBOM
          # exceeded that (~17.3 MiB), whereas its CycloneDX SBOM is ~10.4 MiB.
          format: cyclonedx-json
          output-file: sbom-${{ matrix.image }}${{ matrix.version != '' && format('-{0}', matrix.version) || '' }}.cdx.json

      - name: Attest SBOM
        id: attest-sbom
        if: github.event_name != 'pull_request'
        # See the provenance step above: retry below absorbs transient Sigstore/Rekor failures.
        continue-on-error: true
        uses: actions/attest-sbom@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          sbom-path: sbom-${{ matrix.image }}${{ matrix.version != '' && format('-{0}', matrix.version) || '' }}.cdx.json
          push-to-registry: false

      - name: Attest SBOM (retry)
        # One retry on transient Sigstore/Rekor failures. If this also fails the build fails.
        if: github.event_name != 'pull_request' && steps.attest-sbom.outcome == 'failure'
        uses: actions/attest-sbom@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          sbom-path: sbom-${{ matrix.image }}${{ matrix.version != '' && format('-{0}', matrix.version) || '' }}.cdx.json
          push-to-registry: false

  publish-aliases:
    if: github.event_name != 'pull_request'
    needs: [discover, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          YQ_VERSION=4.44.6
          curl -fsSL -o /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64"
          chmod +x /usr/local/bin/yq

      - name: Publish convenience aliases
        env:
          OWNER: ${{ github.repository_owner }}
          MATRIX: ${{ needs.discover.outputs.matrix }}
        run: |
          set -euo pipefail
          mapfile -t BUILT < <(echo "$MATRIX" | jq -r '[.[].image] | unique | .[]')
          for image_name in "${BUILT[@]}"; do
            image_dir="images/${image_name}/"
            [ -d "$image_dir" ] || continue

            if [[ ! "$image_name" =~ ^(.+)-ubi([0-9]+)$ ]]; then
              echo "Skipping ${image_name} — no UBI suffix to strip"
              continue
            fi
            alias_name="${BASH_REMATCH[1]}"

            source_image="ghcr.io/${OWNER}/${image_name}"
            alias_image="ghcr.io/${OWNER}/${alias_name}"

            if [ -f "${image_dir}/image.yaml" ] && yq -e '.build_matrix' "${image_dir}/image.yaml" >/dev/null 2>&1; then
              # build_matrix: publish one alias set per version entry
              while IFS= read -r row; do
                TAGS_JSON=$(echo "$row" | jq -c '.tags')
                SRC_TAG=$(echo "$TAGS_JSON" | jq -r 'map(select(. != "latest"))[0] // "latest"')

                digest=$(docker buildx imagetools inspect "${source_image}:${SRC_TAG}" --format '{{json .Manifest}}' 2>/dev/null | jq -r '.digest' || true)
                if [ -z "$digest" ] || [ "$digest" = "null" ]; then
                  echo "Warning: could not fetch digest for ${source_image}:${SRC_TAG} — skipping"
                  continue
                fi

                source_ref="${source_image}@${digest}"
                declare -a TAGS=()
                for tag in $(echo "$TAGS_JSON" | jq -r '.[]'); do
                  [ -z "${tag}" ] && continue
                  TAGS+=(--tag "${alias_image}:${tag}")
                done

                echo "Publishing alias: ${alias_image} tags=[$(echo "$TAGS_JSON" | jq -r 'join(", ")')] -> ${source_ref}"
                docker buildx imagetools create "${TAGS[@]}" "${source_ref}"

                unset TAGS
              done < <(yq -o=json -I=0 '.build_matrix.versions[]' "${image_dir}/image.yaml")
            else
              # Legacy: single image, all tags point to latest digest
              digest=$(docker buildx imagetools inspect "${source_image}:latest" --format '{{json .Manifest}}' 2>/dev/null | jq -r '.digest' || true)
              if [ -z "$digest" ] || [ "$digest" = "null" ]; then
                echo "Warning: could not fetch digest for ${source_image}:latest — skipping"
                continue
              fi

              source_ref="${source_image}@${digest}"

              declare -a TAGS=()
              TAGS+=(--tag "${alias_image}:latest")

              if [ -f "${image_dir}/image.yaml" ]; then
                while IFS= read -r tag; do
                  [ -z "${tag}" ] && continue
                  [ "${tag}" = "latest" ] && continue
                  TAGS+=(--tag "${alias_image}:${tag}")
                done < <(yq -r '(.tags // [])[]' "${image_dir}/image.yaml")
              fi

              echo "Publishing alias: ${alias_image} -> ${source_ref}"
              docker buildx imagetools create "${TAGS[@]}" "${source_ref}"

              unset TAGS
            fi
          done
