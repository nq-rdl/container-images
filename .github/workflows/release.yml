name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # The workflow force-moves the tag onto the changelog commit, which re-fires
    # this workflow. That push is authenticated as the release bot, so skipping
    # the bot's own runs breaks the loop.
    if: github.actor != 'nq-rdl-release-bot[bot]'

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Verify tag points to a commit on main
        env:
          SHA: ${{ github.sha }}
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$SHA" origin/main; then
            echo "::error::Release tags must point to commits already on main."
            exit 1
          fi

      - name: Detect changelog state
        id: changelog
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"

          # changie writes one *.yaml per change into .changes/unreleased/.
          # Glob for those directly (ignores the .gitkeep placeholder).
          has_unreleased=""
          for f in .changes/unreleased/*.yaml; do
            [ -e "$f" ] || continue
            has_unreleased="true"
            break
          done

          has_batched=""
          if [ -f ".changes/${version}.md" ]; then
            has_batched="true"
          fi

          if [ -z "$has_unreleased" ] && [ -z "$has_batched" ]; then
            echo "::error::No unreleased changelog entries or pre-batched version file found. Nothing to release."
            exit 1
          fi

          if [ -n "$has_unreleased" ] && [ -n "$has_batched" ]; then
            echo "::error::Both unreleased fragments and a pre-batched .changes/${version}.md exist. Refusing to re-batch and overwrite the existing file."
            echo "::error::This typically happens on a release retry when a fix PR added a new changie fragment."
            echo "::error::Resolve by picking one:"
            echo "::error::  (a) If the fragments belong in ${TAG}: merge their content into .changes/${version}.md and CHANGELOG.md, then delete the fragment files."
            echo "::error::  (b) If the fragments should not ship here: delete the fragment files. For future retry PRs, apply the 'skip-changelog' label so changelog-check does not require a fragment."
            exit 1
          fi

          if [ -n "$has_unreleased" ]; then
            echo "needs_batch=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_batch=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install changie
        if: steps.changelog.outputs.needs_batch == 'true'
        uses: miniscruff/changie-action@v3
        with:
          version: latest

      - name: Batch and merge changelog
        if: steps.changelog.outputs.needs_batch == 'true'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          changie batch "$version"
          changie merge

      - name: Commit changelog updates
        if: steps.changelog.outputs.needs_batch == 'true'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .changes/ CHANGELOG.md
          git commit -m "chore: update changelog for ${TAG}"

          # main is PR-protected and requires linear history, and it can advance
          # between the tag push and this job. Replay the single changelog commit
          # onto the current main tip and retry, so a concurrent merge does not
          # abort the release with a non-fast-forward rejection.
          pushed=""
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::error::Could not replay the changelog commit onto origin/main (unexpected conflict)."
              exit 1
            fi
            if git push origin HEAD:main; then
              pushed="true"
              break
            fi
            echo "::warning::push to main rejected (attempt ${attempt}/5); refetching and retrying"
            sleep 5
          done
          if [ -z "$pushed" ]; then
            echo "::error::Failed to push the changelog commit to main."
            echo "::error::Ensure the nq-rdl-release-bot GitHub App is installed on this repo with write access to main (as on the sibling repos)."
            exit 1
          fi

      - name: Move tag to include changelog commit
        if: steps.changelog.outputs.needs_batch == 'true'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Refuse annotated/signed tags: moving them would drop annotation/signature metadata.
          if [ "$(git cat-file -t "$TAG")" = "tag" ]; then
            echo "::error::Annotated/signed tags are not supported by this workflow. Create and push a lightweight tag instead (e.g. 'git tag vX.Y.Z')."
            exit 1
          fi
          git tag -f "$TAG"
          git push origin "$TAG" --force

      - name: Prepare release notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          cp ".changes/${version}.md" release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.md
          generate_release_notes: false
