name: Trivy Scheduled Rescan

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  security-events: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7

      - name: Install yq
        run: |
          YQ_VERSION=4.44.6
          curl -fsSL -o /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64"
          chmod +x /usr/local/bin/yq

      - id: set-matrix
        run: |
          set -euo pipefail
          MATRIX="[]"
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            name=$(basename "$dir")
            yaml="${dir}/image.yaml"
            [ -f "$yaml" ] || continue
            if yq -e '.build_matrix' "$yaml" >/dev/null 2>&1; then
              TAGS=$(yq -r '[.build_matrix.versions[].tags[]] | unique | .[]' "$yaml")
            else
              TAGS=$(yq -r '((.tags // []) + ["latest"]) | unique | .[]' "$yaml")
            fi
            # Canonical -ubiN tags only; stripped aliases share the same index digest,
            # so scanning them would be redundant (identical content, duplicate SARIF).
            while IFS= read -r tag; do
              [ -z "$tag" ] && continue
              MATRIX=$(echo "$MATRIX" | jq --arg i "$name" --arg t "$tag" '. + [{"image":$i,"tag":$t}]')
            done <<< "$TAGS"
          done < <(find images -mindepth 1 -maxdepth 1 -type d -exec test -f '{}/Containerfile' \; -print)
          echo "matrix=$(echo "$MATRIX" | jq -c '.')" >> "$GITHUB_OUTPUT"

  rescan:
    needs: discover
    if: needs.discover.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan published image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ matrix.tag }}
          format: sarif
          output: trivy-rescan-${{ matrix.image }}-${{ matrix.tag }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-rescan-${{ matrix.image }}-${{ matrix.tag }}.sarif
          category: trivy-rescan-${{ matrix.image }}-${{ matrix.tag }}

  # Third-party, closed-source build images we consume but cannot patch — e.g. the
  # JetBrains Writerside builder used by the documentation repo's build stage. We
  # scan these to OBSERVE, not to gate: track newly-disclosed CVEs, inform which
  # upstream tag we pin to, and retain audit evidence for governance. The image is
  # build-time only (it never ships to production), so findings are informational
  # (exit-code 0). Unlike the owned-image gate, --ignore-unfixed is deliberately
  # omitted — we can't selectively patch a closed image, so we keep unfixed findings
  # too, not just fixable ones (severity is still scoped to CRITICAL/HIGH below).
  # Keep each tag in sync with the consuming repo's pin (documentation Dockerfile
  # `FROM jetbrains/writerside-builder:<tag>`).
  rescan-thirdparty:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: jetbrains/writerside-builder
            tag: '2025.04.8412'
            slug: writerside-builder
    steps:
      - uses: actions/checkout@v7

      # Public Docker Hub image — no auth needed. If anonymous pull rate limits on
      # shared runners become a problem, add a docker/login-action@v4 step with
      # Docker Hub credentials before this scan.
      - name: Scan third-party image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}:${{ matrix.tag }}
          format: sarif
          output: trivy-rescan-thirdparty-${{ matrix.slug }}-${{ matrix.tag }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-rescan-thirdparty-${{ matrix.slug }}-${{ matrix.tag }}.sarif
          category: trivy-rescan-thirdparty-${{ matrix.slug }}-${{ matrix.tag }}
