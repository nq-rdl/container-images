name: Trivy Scheduled Rescan

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  security-events: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Install yq
        run: |
          YQ_VERSION=4.44.6
          curl -fsSL -o /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64"
          chmod +x /usr/local/bin/yq

      - id: set-matrix
        run: |
          set -euo pipefail
          MATRIX="[]"
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            name=$(basename "$dir")
            yaml="${dir}/image.yaml"
            [ -f "$yaml" ] || continue
            if yq -e '.build_matrix' "$yaml" >/dev/null 2>&1; then
              TAGS=$(yq -r '[.build_matrix.versions[].tags[]] | unique | .[]' "$yaml")
            else
              TAGS=$(yq -r '((.tags // []) + ["latest"]) | unique | .[]' "$yaml")
            fi
            # Also scan the stripped convenience alias (e.g. python-ubi9 -> python).
            alias_name=""
            if [[ "$name" =~ ^(.+)-ubi[0-9]+$ ]]; then alias_name="${BASH_REMATCH[1]}"; fi
            while IFS= read -r tag; do
              [ -z "$tag" ] && continue
              MATRIX=$(echo "$MATRIX" | jq --arg i "$name" --arg t "$tag" '. + [{"image":$i,"tag":$t}]')
              [ -n "$alias_name" ] && MATRIX=$(echo "$MATRIX" | jq --arg i "$alias_name" --arg t "$tag" '. + [{"image":$i,"tag":$t}]')
            done <<< "$TAGS"
          done < <(find images -mindepth 1 -maxdepth 1 -type d -exec test -f '{}/Containerfile' \; -print)
          echo "matrix=$(echo "$MATRIX" | jq -c '.')" >> "$GITHUB_OUTPUT"

  rescan:
    needs: discover
    if: needs.discover.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan published image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ matrix.tag }}
          format: sarif
          output: trivy-rescan-${{ matrix.image }}-${{ matrix.tag }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-rescan-${{ matrix.image }}-${{ matrix.tag }}.sarif
          category: trivy-rescan-${{ matrix.image }}-${{ matrix.tag }}
