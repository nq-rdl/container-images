name: Validate Base Pins

on:
  pull_request:
    paths: ['images/**', 'tests/**', 'scripts/repin-chained-base.sh', 'pyproject.toml', '.github/workflows/validate-base-pins.yml']
  push:
    branches: [main]
    paths: ['images/**', 'tests/**', 'scripts/repin-chained-base.sh', 'pyproject.toml', '.github/workflows/validate-base-pins.yml']

permissions:
  contents: read
  packages: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: imjasonh/setup-crane@v0.7

      # Authenticate to GHCR so a not-yet-published chained base (a brand-new chain's first PR)
      # returns MANIFEST_UNKNOWN — which tests/test-chained-bases-reachable.sh treats as a
      # bootstrap SKIP. Unauthenticated, GHCR answers DENIED for a nonexistent package, which the
      # guard (correctly) fails on. Login does not change behaviour for already-published bases.
      - name: Log in to GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: echo "$GH_TOKEN" | crane auth login ghcr.io -u "$ACTOR" --password-stdin

      - name: Install yq
        run: |
          YQ_VERSION=4.44.6
          curl -fsSL -o /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64"
          chmod +x /usr/local/bin/yq

      # Ensured here (before the first jq use below) so a jq-less runner fails this step's own
      # check rather than the inline jq pipe further down with a cryptic error.
      - name: Ensure jq is installed (used by the index/platform checks below)
        run: command -v jq >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y jq)

      # Offline: no network, no crane needed. Tests scripts/repin-chained-base.sh end-to-end with a
      # stub crane, covering error-class discrimination, digest-format validation, path normalisation,
      # and comment updating. Placed before the registry-querying checks so a broken script fails
      # fast, without spending any network round-trips first.
      - name: Test repin-chained-base script (offline, hermetic)
        run: bash tests/test-repin-chained-base.sh

      - name: Assert each pinned base is an index covering declared platforms
        run: |
          set -euo pipefail
          rc=0
          for cf in images/*/Containerfile; do
            dir=$(dirname "$cf")
            yaml="${dir}/image.yaml"
            if [ ! -f "$yaml" ]; then echo "FAIL: ${dir}: missing image.yaml"; rc=1; continue; fi
            mapfile -t WANT < <(yq -r '(.platforms // ["linux/amd64"])[]' "$yaml")
            [ "${#WANT[@]}" -gt 0 ] || { echo "FAIL: ${yaml}: no platforms"; rc=1; continue; }
            while IFS= read -r line; do
              spec=$(echo "$line" | sed -E 's/^[[:space:]]*[Ff][Rr][Oo][Mm][[:space:]]+//; s/--platform=[^[:space:]]+[[:space:]]+//; s/[[:space:]]+[Aa][Ss][[:space:]]+.*$//' | awk '{print $1}')
              case "$spec" in *"@sha256:"*) ;; *) continue ;; esac
              # crane/skopeo reject repo:tag@digest refs; fetch by repo@digest (digest is content-addressed).
              repo="${spec%@*}"; ref="${repo%:*}@${spec##*@}"
              # jq -e errors (non-zero) on a non-index or empty manifest list — fail-closed.
              # Same filter as tests/test-chained-bases-reachable.sh — keep the two in sync.
              if ! have=$(crane manifest "$ref" | jq -er 'if (.manifests | type) == "array" and (.manifests | length) > 0 then [.manifests[].platform | "\(.os)/\(.architecture)"] | join(" ") else error("not a non-empty image index") end' 2>/dev/null); then
                echo "FAIL: ${cf}: ${spec} is not a multi-arch index"; rc=1; continue
              fi
              for p in "${WANT[@]}"; do
                grep -qw "$p" <<< "$have" || { echo "FAIL: ${cf}: ${spec} missing ${p} (has: ${have})"; rc=1; }
              done
              echo "OK: ${cf}: ${spec} covers ${WANT[*]}"
            done < <(grep -iE '^[[:space:]]*FROM[[:space:]]' "$cf")
          done
          exit "$rc"

      - name: Assert chained ARG BASE_CONTAINER pins are digest-pinned (format, offline)
        run: bash tests/test-chained-bases-pinned.sh

      - name: Assert chained ARG BASE_CONTAINER pins resolve and cover declared platforms
        env:
          CHAINED_BASES_STRICT: "1"  # missing crane/jq must FAIL in CI, not silently SKIP
        run: bash tests/test-chained-bases-reachable.sh
