repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-merge-conflict

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks
        args: [--config, .gitleaks.toml]

  - repo: local
    hooks:
      - id: hadolint
        name: hadolint
        entry: pixi run hadolint --config .hadolint.yaml
        language: system
        files: Containerfile$
        types: [file]

      - id: shellcheck
        name: shellcheck
        entry: pixi run shellcheck
        language: system
        types: [shell]
        # Vendored upstream scripts under images/ are not ours to restyle; this
        # mirrors the lint-shell pixi task scope (scripts + tests only).
        exclude: ^images/

      - id: actionlint
        name: actionlint
        entry: pixi run actionlint
        language: system
        files: \.github/workflows/.*\.yml$
        pass_filenames: false

      - id: conftest
        name: conftest (Containerfile policy)
        entry: pixi run conftest test --policy policy/ --parser dockerfile
        language: system
        files: Containerfile$
        types: [file]

      - id: changie-hint
        name: changie fragment reminder
        entry: scripts/check-changie-fragment.sh hint
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

      - id: changie-fragment
        name: changie fragment required
        entry: scripts/check-changie-fragment.sh enforce
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]

      - id: smoke-test
        name: smoke test (build + container run + k3d)
        entry: scripts/smoke-test.sh
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]

      - id: trivy-scan
        name: trivy vulnerability scan
        entry: scripts/trivy-scan.sh
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]
