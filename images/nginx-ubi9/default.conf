# Generic SPA / static-file server on :8080 (non-root). Consumers COPY their built assets into
# /usr/share/nginx/html. To add an in-cluster API reverse proxy, drop an extra file into
# /etc/nginx/conf.d/ or replace this one (see README).
server {
    listen       8080;
    listen       [::]:8080;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # Security headers (applied to error responses too).
    add_header  X-Frame-Options         "SAMEORIGIN"     always;
    add_header  X-Content-Type-Options  "nosniff"        always;
    add_header  X-XSS-Protection        "1; mode=block"  always;

    # SPA fallback: unknown paths resolve to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache fingerprinted static assets. nginx's add_header inheritance is replace-not-merge:
    # because this location sets its own add_header, the server-level security headers above are
    # NOT inherited here and must be repeated, or static assets ship without them.
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires    1y;
        add_header  Cache-Control           "public, no-transform";
        add_header  X-Frame-Options         "SAMEORIGIN"     always;
        add_header  X-Content-Type-Options  "nosniff"        always;
        add_header  X-XSS-Protection        "1; mode=block"  always;
    }

    # Liveness/readiness endpoint.
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }
}
