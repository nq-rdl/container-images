# Main nginx config for rootless (uid 1001) operation on UBI9-micro.
# No `user` directive: as a non-root master, nginx runs workers as the starting uid.
worker_processes auto;
error_log  /dev/stderr  notice;
pid        /tmp/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Writable spool/temp paths for non-root operation. /tmp always exists (even when mounted as
    # tmpfs); nginx creates these subdirectories at startup.
    client_body_temp_path  /tmp/client_temp;
    proxy_temp_path        /tmp/proxy_temp;
    fastcgi_temp_path      /tmp/fastcgi_temp;
    uwsgi_temp_path        /tmp/uwsgi_temp;
    scgi_temp_path         /tmp/scgi_temp;

    access_log  /dev/stdout;

    sendfile           on;
    tcp_nopush         on;
    keepalive_timeout  65;

    gzip               on;
    gzip_proxied       any;
    gzip_types         text/plain text/css application/json application/javascript
                       text/xml application/xml application/xml+rss text/javascript;

    include /etc/nginx/conf.d/*.conf;
}
