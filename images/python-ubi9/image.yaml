name: python-ubi9
description: Python runtime on UBI9 minimal
owners:
  - nq-rdl/platform
  - nq-rdl/data-engineering
platforms:
  - linux/amd64
base:
  registry: registry.access.redhat.com
  repository: ubi9/ubi-minimal
  version: "9.5"
runtime:
  name: python
tags:
  - "3.11"
  - "3.12"
  - "latest"
build_matrix:
  arg: PYTHON_VERSION
  versions:
    - version: "3.11"
      tags: ["3.11"]
    - version: "3.12"
      tags: ["3.12", "latest"]
support:
  status: stable
  eol: "2029-10-31"
