# Manual/interactive MITM fixture for the proxy-ca probe (issue #59).
# The authoritative automated acceptance test is tests/proxy-ca/run-docker.sh;
# this file is a convenience for exploring the probe by hand, e.g.:
#   docker compose -f tests/proxy-ca/docker-compose.yaml up -d mitm
#   docker compose -f tests/proxy-ca/docker-compose.yaml run --rm probe --report human
#   docker compose -f tests/proxy-ca/docker-compose.yaml down
services:
  mitm:
    image: docker.io/mitmproxy/mitmproxy@sha256:00b77b5d8804c8ad18cb6caefbf9d5849e895e8986c5ce011f4ae30f4385962f
    command: mitmdump --mode regular --listen-port 8080
    ports:
      - "8080:8080"
    volumes:
      - ./.ca:/home/mitmproxy/.mitmproxy
  probe:
    build: ../../images/proxy-ca-probe-ubi9
    # depends_on only orders startup, NOT CA readiness: bring mitm up first so its
    # CA is generated under ./.ca (`up -d mitm`), THEN `run probe`.
    depends_on:
      - mitm
    environment:
      TARGET_URL: https://example.com
      HTTPS_PROXY: http://mitm:8080
      https_proxy: http://mitm:8080
      NO_PROXY: localhost,127.0.0.1
    entrypoint: ["proxy-ca-probe"]
    command: ["--report", "human"]
